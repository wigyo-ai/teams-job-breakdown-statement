# =============================================================================
# Certis JBS Platform — Reference Configuration
#
# This file documents the environment variable mapping for the three middleware
# services deployed on Azure Container Apps (ACA):
#   1. Webhook Service      (FastAPI — receives Microsoft Teams events via Azure Bot Service)
#   2. Conversation Orchestrator (FastAPI — phase state machine + h2oGPTe calls)
#   3. Document Generator   (Python — renders .docx from approved JBS JSON)
#   4. SharePoint Sync      (ACA Scheduled Job — runs daily to keep h2oGPTe collections fresh)
#
# Primary deployment uses `az containerapp` commands — see docs/DEPLOYMENT_GUIDE.md.
# The env-vars listed here map directly to ACA --env-vars / --secrets parameters.
#
# NOT deployed via this chart (managed separately):
#   - Admin Dashboard  → deploy via `h2o bundle` + HAIC App Store
#   - Redis            → eliminated; h2oGPTe owns conversation history natively
#   - h2oGPTe          → licensed HAIC service, pre-provisioned
#   - H2O Document AI  → licensed HAIC service, pre-provisioned
#   - H2O MLOps        → configured via HAIC console
# =============================================================================

global:
  registry: myregistry.azurecr.io/certis
  imageTag: "1.0.0"
  imagePullPolicy: Always
  tenantId: "certis"
  orchestratorUrl: "http://certis-jbs-orchestrator:8001"
  documentGeneratorUrl: "http://certis-jbs-docgen:8002"

# -----------------------------------------------------------------------------
# 1. Webhook Service
#    Public-facing. Receives Bot Framework Activity events from Microsoft Teams.
#    Register the messaging endpoint in your Azure Bot resource as:
#      https://<host>/webhook/teams
# -----------------------------------------------------------------------------
webhook:
  replicaCount: 2
  image: jbs-webhook
  port: 8000
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    host: <your-webhook-app>.azurecontainerapps.io   # Must be publicly reachable by Azure Bot Service
    tlsSecret: jbs-webhook-tls
  env:
    plain:
      TEAMS_APP_ID: "<PLACEHOLDER>"               # Azure Bot App Registration client ID
    secret:
      TEAMS_APP_PASSWORD:
        name: certis-jbs-secrets
        key: teams-app-password

# -----------------------------------------------------------------------------
# 2. Conversation Orchestrator
#    Internal only. Phase state machine. Calls h2oGPTe for LLM + RAG.
#    State backend: memory (default) | sqlite | external_redis
#    No Redis pod deployed — h2oGPTe owns conversation turn history.
# -----------------------------------------------------------------------------
orchestrator:
  replicaCount: 2
  image: jbs-orchestrator
  port: 8001
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  env:
    plain:
      H2OGPTE_ADDRESS: "https://your-h2ogpte-instance.h2o.ai"
      AZURE_TENANT_ID: "<PLACEHOLDER>"
      AZURE_CLIENT_ID: "<PLACEHOLDER>"
      SP_SITE_URL: "https://wigyoai.sharepoint.com/sites/h2O"
      SP_LIBRARY_CORPORATE: "<PLACEHOLDER>"
      SP_LIBRARY_AVIATION: "<PLACEHOLDER>"
      SP_LIBRARY_INDUSTRIAL: "<PLACEHOLDER>"
      SP_LIBRARY_MARITIME: "<PLACEHOLDER>"
      SP_LIBRARY_RETAIL: "<PLACEHOLDER>"
      TENANT_ID: "certis"
      SESSION_TTL_HOURS: "24"
      # State backend: "memory" (single replica), "sqlite" (restart-safe), or
      # "external_redis" (multi-replica — requires REDIS_URL below)
      STATE_BACKEND: "sqlite"
      SQLITE_PATH: "/data/jbs_sessions.db"
    secret:
      H2OGPTE_API_KEY:
        name: certis-jbs-secrets
        key: h2ogpte-api-key
      AZURE_CLIENT_SECRET:
        name: certis-jbs-secrets
        key: azure-client-secret
      # Only needed if STATE_BACKEND=external_redis
      # REDIS_URL:
      #   name: certis-jbs-secrets
      #   key: redis-url

# -----------------------------------------------------------------------------
# 3. Document Generator
#    Internal only. Renders approved JBS JSON to .docx, uploads to Azure Blob Storage.
# -----------------------------------------------------------------------------
documentGenerator:
  replicaCount: 1
  image: jbs-docgen
  port: 8002
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  env:
    plain:
      AZURE_STORAGE_ACCOUNT: "<your storage account name>"
      AZURE_STORAGE_CONTAINER: "certis-jbs-documents"
      BLOB_PREFIX: "jbs-documents/"
      DOC_URL_EXPIRY_SECONDS: "900"
    secret:
      AZURE_STORAGE_KEY:
        name: certis-jbs-secrets
        key: storage-key

# -----------------------------------------------------------------------------
# 4. SharePoint Sync CronJob
#    Daily sync: SharePoint → H2O Document AI → h2oGPTe collections
# -----------------------------------------------------------------------------
syncCronJob:
  enabled: true
  schedule: "0 2 * * *"    # Daily at 02:00 UTC
  image: jbs-orchestrator   # Reuses orchestrator image
  command: ["python", "-m", "src.rag.sharepoint_sync"]
  restartPolicy: OnFailure
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
